
{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h1>{{ title }}</h1>
  {% include "partials/mar_data_nav.html" %}
  <form method="post">
    <p>Nombre<br><input name="nombre" value="{{ item.nombre if item else '' }}" required style="width:420px;"></p>
    <p>Unidad<br><input name="unidad" value="{{ item.unidad if item else '' }}" style="width:160px;"></p>
    <p>Precio unitario<br><input name="precio_unitario" type="number" step="0.0001" value="{{ item.precio_unitario if item else 0 }}" style="width:200px;"></p>
    <button type="submit">Guardar</button>
    <a href="{{ back }}">Cancelar</a>
  </form>
</div>
{% endblock %}
