{% extends "base.html" %}
{% block content %}

<!-- 🔢 MÉTRICAS -->
<div class="row mb-4 text-center">
  <div class="col-md-4">
    <div class="card border-success shadow-sm">
      <div class="card-body">
        <h6 class="text-success">Importe Total</h6>
        <h3 class="fw-bold text-dark">${{ "{:,.2f}".format(total_importe) }}</h3>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border-primary shadow-sm">
      <div class="card-body">
        <h6 class="text-primary">Cotizaciones Totales</h6>
        <h3 class="fw-bold text-dark">{{ total_cotizaciones }}</h3>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border-info shadow-sm">
      <div class="card-body">
        <h6 class="text-info">Conceptos Registrados</h6>
        <h3 class="fw-bold text-dark">{{ total_catalogo }}</h3>
      </div>
    </div>
  </div>
</div>

<!-- 📊 GRÁFICAS -->
<div class="row mt-4">
  <!-- 📈 Gráfica 1: Importe Total -->
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title text-primary">Importe Total por Mes</h5>
        <canvas id="chartImporte"></canvas>
      </div>
    </div>
  </div>

  <!-- 📈 Gráfica 2: Cantidad de Cotizaciones -->
  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title text-success">Cotizaciones por Mes</h5>
        <canvas id="chartCantidad"></canvas>
      </div>
    </div>
  </div>

  <!-- 📊 Distribución por Estatus -->
  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Distribución por Estatus</h5>
        <canvas id="chartEstatus"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- 📋 TABLA DE COTIZACIONES + FILTROS -->
{{ super() }}  <!-- tu tabla y filtros siguen igual -->

<!-- 📈 SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
async function cargarGraficas() {
  try {
    // ===== 1️⃣ Gráficas mensuales =====
    const res1 = await fetch("/api/dashboard/metrics");
    const data1 = await res1.json();

    const labels = data1.series.map(x => x.mes);
    const importes = data1.series.map(x => x.total);
    const cantidades = data1.series.map(x => x.cotizaciones);

    // 💰 Importe total mensual
    new Chart(document.getElementById("chartImporte"), {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Importe Total ($)",
          data: importes,
          backgroundColor: "#0d47a1",
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true, title: { display: true, text: "Monto ($)" } }
        }
      }
    });

    // 📦 Cantidad de cotizaciones mensual
    new Chart(document.getElementById("chartCantidad"), {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Cotizaciones",
          data: cantidades,
          backgroundColor: "#43a047",
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true, title: { display: true, text: "Cantidad" } }
        }
      }
    });

    // ===== 2️⃣ Distribución por estatus =====
    const res2 = await fetch("/api/dashboard/status_breakdown");
    const data2 = await res2.json();

    new Chart(document.getElementById("chartEstatus"), {
      type: "doughnut",
      data: {
        labels: data2.labels,
        datasets: [{
          data: data2.counts,
          backgroundColor: ["#4caf50", "#ffeb3b", "#2196f3", "#f44336"]
        }]
      },
      options: { plugins: { legend: { position: "bottom" } } }
    });
  } catch (err) {
    console.error("Error cargando gráficas", err);
  }
}

document.addEventListener("DOMContentLoaded", cargarGraficas);
</script>

{% endblock %}
