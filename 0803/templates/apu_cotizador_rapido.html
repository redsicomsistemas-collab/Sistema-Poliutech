{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h1>Cotizador rápido MAR DATA</h1>
  <p>Genera una cotización de una sola partida directamente desde un APU.</p>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label">Buscar APU</label>
            <input type="text" id="apu_search" class="form-control" placeholder="Escribe concepto o clave">
            <div id="apu_suggestions" class="list-group position-absolute w-50" style="z-index:3000;"></div>
            <input type="hidden" name="apu_id" id="apu_id">
          </div>
          <div class="col-md-4">
            <label class="form-label">Cantidad</label>
            <input type="number" step="0.0001" class="form-control" name="cantidad" value="1">
          </div>
          <div class="col-md-4"><label class="form-label">Cliente</label><input class="form-control" name="cliente"></div>
          <div class="col-md-4"><label class="form-label">Empresa</label><input class="form-control" name="empresa"></div>
          <div class="col-md-4"><label class="form-label">Correo</label><input class="form-control" name="correo"></div>
          <div class="col-md-4"><label class="form-label">Teléfono</label><input class="form-control" name="telefono"></div>
          <div class="col-md-8"><label class="form-label">Dirección</label><input class="form-control" name="direccion"></div>
          <div class="col-12"><label class="form-label">Notas</label><textarea class="form-control" name="notas" rows="3"></textarea></div>
        </div>
        <div class="mt-3"><button type="submit" class="btn btn-primary">Generar cotización rápida</button></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
